name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "回滚用：已存在的镜像 tag（如 sha-abc1234）"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event.inputs.image_tag == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:prod
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送 frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:prod
            ghcr.io/${{ github.repository }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE || 'https://agent.yunmiao.site' }}
            NEXT_PUBLIC_LANGFUSE_BASE_URL=${{ vars.NEXT_PUBLIC_LANGFUSE_BASE_URL || 'https://cloud.langfuse.com' }}
            NEXT_PUBLIC_LANGFUSE_PROJECT_ID=${{ vars.NEXT_PUBLIC_LANGFUSE_PROJECT_ID || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: ${{ always() && (github.event_name == 'push' || github.event.inputs.image_tag != '' || needs.build.result == 'success') }}
    runs-on: ubuntu-latest
    environment: prod
    env:
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      GHCR_PULL_USER: ${{ vars.GHCR_PULL_USER || 'moonlight2893267956' }}
    steps:
      - name: 计算部署镜像 tag
        id: tag
        run: |
          RAW="${{ github.event.inputs.image_tag }}"
          if [ -z "$RAW" ]; then RAW="${{ github.sha }}"; fi
          case "$RAW" in
            sha-*) TAG="$RAW" ;;
            *) TAG="sha-$RAW" ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: SSH 登录并部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: "test.example.com"
          username: "testuser"
          key: "dummy-key"
          port: "22"
          command_timeout: 30m
          script_stop: true
        script: |
          echo "hello"
