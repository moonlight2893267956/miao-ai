name: CD

# 推送 main 自动部署（构建并上线 prod）
on:
  push:
    branches: [main]

# 同一时间只允许一个部署流水线运行，排队而非取消（避免中断正在进行的部署）
concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 构建并推送镜像到 GHCR（双标签 :prod + :sha-<7位短哈希>）
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 计算短 SHA 标签
        id: meta
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:sha-${{ steps.meta.outputs.sha_short }}
            ghcr.io/${{ github.repository }}/backend:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送 frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:sha-${{ steps.meta.outputs.sha_short }}
            ghcr.io/${{ github.repository }}/frontend:prod
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE || 'https://agent.yunmiao.site' }}
            NEXT_PUBLIC_LANGFUSE_BASE_URL=${{ vars.NEXT_PUBLIC_LANGFUSE_BASE_URL || 'https://cloud.langfuse.com' }}
            NEXT_PUBLIC_LANGFUSE_PROJECT_ID=${{ vars.NEXT_PUBLIC_LANGFUSE_PROJECT_ID || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2: SSH 到 VPS 拉取镜像并重启（原生 ssh/scp，不依赖第三方 action）
  # ─────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_USER: ${{ vars.SSH_USER }}
      SSH_PORT: ${{ vars.SSH_PORT || '22' }}
      SSH_DEPLOY_PATH: ${{ vars.SSH_DEPLOY_PATH }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      GHCR_PULL_USER: ${{ vars.GHCR_PULL_USER }}
      IMAGE_TAG: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 配置 SSH 并部署
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH="ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no"
          SCP="scp -i ~/.ssh/deploy_key -P $SSH_PORT -o StrictHostKeyChecking=no"

          # 创建部署目录并上传编排文件 + 远程脚本
          $SSH "$SSH_USER@$SSH_HOST" "mkdir -p $SSH_DEPLOY_PATH"
          $SCP docker-compose.prod.yml "$SSH_USER@$SSH_HOST:$SSH_DEPLOY_PATH/"
          $SCP scripts/deploy-remote.sh "$SSH_USER@$SSH_HOST:/tmp/deploy-remote.sh"

          # 在服务器上执行远程部署脚本
          $SSH "$SSH_USER@$SSH_HOST" \
            "chmod +x /tmp/deploy-remote.sh && DEPLOY_DIR='$SSH_DEPLOY_PATH' IMAGE_TAG='$IMAGE_TAG' GHCR_TOKEN='$GHCR_PULL_TOKEN' GHCR_OWNER='$GHCR_PULL_USER' /tmp/deploy-remote.sh"

      - name: 部署失败提示
        if: failure()
        run: |
          echo "::error::部署失败! 请检查上方日志"
          echo "排查步骤:"
          echo "  1. SSH 到服务器: ssh $SSH_USER@$SSH_HOST"
          echo "  2. 查看日志: cd $SSH_DEPLOY_PATH && docker compose -f docker-compose.prod.yml logs --tail=50"
          echo "  3. 回滚: 在 Actions → Rollback → Run workflow, image_tag 填旧 sha（如 sha-a1b2c3d）"
