# ============================================================
# miao-ai 生产部署编排
# ============================================================
# MySQL + Redis 由 miao-infra 提供（独立 compose，详见 ../miao-infra/）。
# miao-ai 通过外部网络 miao-infra-net 连接，不创建自己的数据库 / 缓存容器。
#
# 部署前确认：
#   1. miao-infra 已启动：cd ../miao-infra && docker compose ps
#   2. miao_ai 库已创建（见 miao-infra/docker-compose.yml 顶部注释）
#   3. .env 中 DATABASE_URL host 写 miao-mysql（Docker 网络内服务名）
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-${BUILD_HTTP_PROXY:-}}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-${BUILD_HTTP_PROXY:-}}
        APT_MIRROR: ${BUILD_APT_MIRROR:-http://mirrors.aliyun.com/debian}
        APT_SECURITY_MIRROR: ${BUILD_APT_SECURITY_MIRROR:-http://mirrors.aliyun.com/debian-security}
        PIP_INDEX_URL: ${BUILD_PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${BUILD_PIP_TRUSTED_HOST:-mirrors.aliyun.com}
    container_name: miao-backend
    env_file:
      - .env
    environment:
      agent_runtime_mode: ${AGENT_RUNTIME_MODE:-docker}
      AGENT_RUNTIME_MODE: ${AGENT_RUNTIME_MODE:-docker}
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - miao-agent-work:/tmp/miao/agents
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - miao-infra-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-${BUILD_HTTP_PROXY:-}}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTPS_PROXY:-${BUILD_HTTP_PROXY:-}}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://agent.yunmiao.site}
        NEXT_PUBLIC_LANGFUSE_BASE_URL: ${NEXT_PUBLIC_LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
        NEXT_PUBLIC_LANGFUSE_PROJECT_ID: ${NEXT_PUBLIC_LANGFUSE_PROJECT_ID:-}
    container_name: miao-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:13000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  miao-agent-work:

networks:
  miao-infra-net:
    external: true
    name: miao-infra-net
